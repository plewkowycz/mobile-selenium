name: Selenium Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      # ── Stage 1: Environment Setup ────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Cache Chrome and chromedriver
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            /opt/hostedtoolcache/setup-chrome
          key: chrome-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            chrome-${{ runner.os }}-

      - name: Install Chrome and chromedriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: latest

      # ── Stage 2: Dependencies Installation ───────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Stage 3: Code Quality ─────────────────────────────────────
      - name: Lint and Format Code
        run: |
          ruff format .
          ruff check .

      # ── Stage 4: Test Preparation ───────────────────────────────
      - name: Create directories for artifacts
        run: |
          mkdir -p screenshots reports
          touch screenshots/.gitkeep
          touch reports/.gitkeep

      # ── Stage 5: Test Execution ───────────────────────────────────
      - name: Run Pytest with Retry
        env:
          HEADLESS: "true"
          CI: "true"
        run: |
          pytest -v --tb=short --html=reports/report.html \
            --reruns 3 \
            --reruns-delay 2 \
            tests/

      # ── Stage 6: Artifact Collection ─────────────────────────────
      - name: Upload Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            screenshots/
            reports/
          retention-days: 7

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: reports/report.html
          retention-days: 30
